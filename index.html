<!DOCTYPE html>
<html lang="ru"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mixer Cup — Teams</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0b0e;--card:#14161d;--card-h:#191c24;
  --brd:#23262f;--brd-soft:#1b1e26;
  --tx:#edeef2;--mt:#787f8c;
  --gold:#d4af37;--gold-soft:rgba(212,175,55,.12);
  --em:#1fae84;--em-d:#147a5c;--em-soft:rgba(31,174,132,.12);
  --gr:#3ecf8e;--red:#ef5f6b;--blue:#6aa0ff;--purple:#a78bfa;--orange:#f97316;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);scroll-behavior:smooth}
body{background:radial-gradient(900px 500px at 50% -200px,rgba(31,174,132,.06),transparent 70%),var(--bg);
     color:var(--tx);font-family:'Sora',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}

header{padding:26px 28px 18px;max-width:1040px;margin:0 auto}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:38px;height:38px;border-radius:10px;flex-shrink:0;object-fit:cover;
      border:1px solid var(--em-d);box-shadow:0 4px 14px rgba(31,174,132,.22)}
h1{font-size:21px;font-weight:700;letter-spacing:-.02em;line-height:1}
.sub{color:var(--mt);font-size:11px;margin-top:3px}
.gold-tx{color:var(--em)}

.topbar{max-width:1040px;margin:0 auto;padding:12px 28px 0;
        display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap}
.stats-row{display:flex;gap:12px;flex-wrap:wrap;flex:1}
.st{display:flex;flex-direction:column;gap:1px;background:var(--card);
    border:1px solid var(--brd-soft);border-radius:10px;padding:10px 14px;min-width:80px}
.sn{font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1}
.sl2{font-size:9px;text-transform:uppercase;letter-spacing:1.4px;color:var(--mt);margin-top:3px}
.sn.gold{color:var(--gold)}.sn.green{color:var(--em)}

.controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
input{background:var(--card);border:1px solid var(--brd);color:var(--tx);
      font-family:'Sora',sans-serif;font-size:13px;padding:8px 13px;
      border-radius:9px;width:230px;outline:none;transition:border-color .2s,box-shadow .2s}
input::placeholder{color:var(--mt)}
input:focus{border-color:var(--em-d);box-shadow:0 0 0 3px var(--em-soft)}
.sbtn{background:var(--card);border:1px solid var(--brd);color:var(--mt);
      font-family:'Sora',sans-serif;font-size:12px;font-weight:500;padding:8px 13px;
      border-radius:9px;cursor:pointer;transition:all .25s;white-space:nowrap}
.sbtn:hover{color:var(--tx);border-color:#33363f}
.sbtn.active{background:var(--em-soft);border-color:rgba(31,174,132,.45);color:var(--em)}

.list{max-width:1040px;margin:0 auto;padding:18px 28px 40px;display:flex;flex-direction:column;gap:8px}

.card{background:var(--card);border:1px solid var(--brd-soft);border-radius:12px;
      overflow:hidden;animation:cardIn .4s cubic-bezier(.22,.61,.36,1) both}
.card:hover{border-color:var(--brd)}
.card.open{border-color:rgba(31,174,132,.32);background:var(--card-h)}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.ch{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none}
.rank{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;
      justify-content:center;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;
      background:var(--em-soft);color:var(--em);border:1px solid rgba(31,174,132,.32)}
.rank.r1{background:linear-gradient(140deg,var(--em),var(--em-d));color:#04140f;border-color:transparent;box-shadow:0 3px 10px rgba(31,174,132,.32)}
.rank.r2{background:rgba(212,175,55,.15);color:var(--gold);border-color:rgba(212,175,55,.35)}
.rank.r3{background:rgba(249,115,22,.12);color:var(--orange);border-color:rgba(249,115,22,.35)}
.tn{font-weight:600;font-size:14px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wl-block{display:flex;gap:4px;align-items:center;flex-shrink:0}
.wbadge,.lbadge{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px}
.wbadge{background:rgba(62,207,142,.12);color:var(--gr);border:1px solid rgba(62,207,142,.28)}
.lbadge{background:rgba(239,95,107,.1);color:var(--red);border:1px solid rgba(239,95,107,.25)}
.team-meta{display:flex;gap:6px;flex-shrink:0;align-items:center}
.trat{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--gold);
      background:var(--gold-soft);border:1px solid rgba(212,175,55,.22);padding:2px 8px;border-radius:20px}
.tavg{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--em);
      background:var(--em-soft);border:1px solid rgba(31,174,132,.22);padding:2px 8px;border-radius:20px}
.chev{color:var(--mt);flex-shrink:0;display:flex;transition:transform .4s cubic-bezier(.22,.61,.36,1),color .3s}
.card.open .chev{transform:rotate(180deg);color:var(--em)}

.body{display:grid;grid-template-rows:0fr;opacity:0;
      transition:grid-template-rows .4s cubic-bezier(.22,.61,.36,1),opacity .3s}
.card.open .body{grid-template-rows:1fr;opacity:1}
.body-inner{overflow:hidden}

.tabs{display:flex;gap:0;border-bottom:1px solid var(--brd-soft);padding:0 16px}
.tab{font-size:12px;font-weight:500;padding:10px 14px;cursor:pointer;color:var(--mt);
     border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;user-select:none}
.tab:hover{color:var(--tx)}
.tab.active{color:var(--em);border-bottom-color:var(--em)}
.tab-panel{display:none;padding:0}
.tab-panel.active{display:block}

table{width:100%;border-collapse:collapse}
thead th{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--mt);
         padding:7px 16px;text-align:left;
         border-top:1px solid var(--brd-soft);border-bottom:1px solid var(--brd-soft);font-weight:600}
thead th.r{text-align:right}
.pr td{padding:8px 16px;border-bottom:1px solid var(--brd-soft);vertical-align:middle}
.pr:last-child td{border-bottom:none}
.pr:hover td{background:rgba(31,174,132,.04)}
.pnum{color:var(--mt);font-family:'JetBrains Mono',monospace;font-size:11px;width:18px}
.nk{font-weight:500;font-size:13px}
.sid{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--blue);display:block;margin-top:2px}
.no-sid{color:var(--mt);font-size:10px}
.rat{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gold);text-align:right;font-weight:500}
.plnks{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap}
.plnk{display:inline-flex;align-items:center;gap:3px;font-size:10px;text-decoration:none;
      padding:2px 8px;border-radius:5px;border:1px solid;white-space:nowrap;font-weight:500;transition:all .2s}
.plnk.steam{color:var(--blue);border-color:rgba(106,160,255,.28);background:rgba(106,160,255,.06)}
.plnk.steam:hover{background:rgba(106,160,255,.15);border-color:rgba(106,160,255,.55)}
.plnk.dotabuff{color:var(--purple);border-color:rgba(167,139,250,.28);background:rgba(167,139,250,.06)}
.plnk.dotabuff:hover{background:rgba(167,139,250,.15);border-color:rgba(167,139,250,.55)}

.hero-block{display:flex;flex-direction:column;border:1px solid var(--brd-soft);border-radius:6px;overflow:hidden;margin-top:6px}
.hero-line{display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid var(--brd-soft)}
.hero-line:last-child{border-bottom:none}
.hero-name{font-size:12px;color:var(--tx);min-width:130px;padding:4px 8px}
.hero-wr{font-family:'JetBrains Mono',monospace;font-size:11px;min-width:42px;padding:4px 8px}
.hero-games{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--mt);padding:4px 8px}

.match-list{display:flex;flex-direction:column;gap:6px;padding:12px 16px}
.match-card{background:rgba(255,255,255,.02);border:1px solid var(--brd-soft);border-radius:10px;overflow:hidden}
.match-head{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none}
.match-head:hover{background:rgba(31,174,132,.03)}
.mteams{flex:1;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;min-width:0}
.mwinner{color:var(--em)}
.mloser{color:var(--mt)}
.mvs{color:var(--mt);font-size:11px;flex-shrink:0}
.mdur{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--mt);flex-shrink:0}
.mlink{font-size:10px;color:var(--blue);text-decoration:none;flex-shrink:0}
.mlink:hover{text-decoration:underline}
.mchev{color:var(--mt);flex-shrink:0;transition:transform .3s}
.match-card.open .mchev{transform:rotate(180deg)}

.match-body{display:grid;grid-template-rows:0fr;opacity:0;transition:grid-template-rows .35s,opacity .25s}
.match-card.open .match-body{grid-template-rows:1fr;opacity:1}
.match-body-inner{overflow:hidden;padding:0 14px 12px}

.pb-section{margin-top:10px}
.pb-label{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--mt);margin-bottom:8px;font-weight:600}
.pb-sequence{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.pb-item{position:relative;width:50px;height:28px}
.pb-item img{width:100%;height:100%;border-radius:4px;object-fit:cover;border:2px solid}
.pb-item.ban img{border-color:var(--red);filter:grayscale(.6) opacity(.7)}
.pb-item.pick img{border-color:var(--em)}
.pb-order{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.7);color:var(--gold);
          font-size:10px;font-weight:700;padding:1px 4px;border-radius:3px;font-family:'JetBrains Mono',monospace}

.pb-team-label{font-size:9px;font-weight:600;margin-bottom:3px}
.pb-team-label.t0{color:var(--blue)}.pb-team-label.t1{color:var(--red)}

.mplayers{margin-top:10px;font-size:11px}
.mplayers table{font-size:11px}
.mplayers thead th{font-size:8px;padding:5px 10px}
.mplayers .pr td{padding:5px 10px}

.site-link{color:var(--mt);text-decoration:none;font-size:11px;padding:6px 14px 14px;
           display:inline-flex;align-items:center;gap:5px;transition:color .2s;font-weight:500}
.site-link:hover{color:var(--em)}

.hidden{display:none!important}
.loading,.error{text-align:center;padding:60px 20px;color:var(--mt);font-size:14px}
.error{color:var(--red)}

footer{max-width:1040px;margin:24px auto 0;padding:18px 28px 32px;
       border-top:1px solid var(--brd-soft);text-align:center}
.f-link{color:var(--mt);text-decoration:none;font-size:11px}
.f-link:hover{color:var(--em)}

@media(max-width:600px){
  header,.topbar,.list,footer{padding-left:14px;padding-right:14px}
  input{width:100%;flex:1}.controls{width:100%}
  .trat,.tavg{display:none}
}
</style>
</head><body>

<header>
  <div class="brand">
    <img class="logo" src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/photo_2026-06-20_02-46-46-XPYlSubbR58RDRV3yeuio8jA3lgT41.jpg" alt="logo">
    <div>
      <h1>Mixer Cup <span class="gold-tx">— Dota 2</span></h1>
      <div class="sub">mixer-cup.gg · active tour<span id="updated"></span></div>
    </div>
  </div>
</header>

<div class="topbar">
  <div class="stats-row">
    <div class="st"><span class="sn green" id="s-t">—</span><span class="sl2">Команд</span></div>
    <div class="st"><span class="sn" id="s-p">—</span><span class="sl2">Игроков</span></div>
    <div class="st"><span class="sn" id="s-i">—</span><span class="sl2">Steam ID</span></div>
    <div class="st"><span class="sn gold" id="s-avg">—</span><span class="sl2">AVG турнира</span></div>
    <div class="st"><span class="sn" id="s-m">—</span><span class="sl2">Матчей</span></div>
  </div>
  <div class="controls">
    <input type="text" id="q" placeholder="Поиск по нику, команде, Steam ID…" oninput="filter()">
    <button class="sbtn active" id="btn-rating" onclick="setSort('rating')">По рейтингу ↓</button>
  </div>
</div>

<div class="list" id="grid">
  <div class="loading">Загружаем данные…</div>
</div>

<footer>
  <a class="f-link" href="https://mixer-cup.gg/ru/active-tour" target="_blank" rel="noopener">mixer-cup.gg/ru/active-tour</a>
</footer>

<script>
window.GIST_URL = 'https://gist.githubusercontent.com/cworq/96e0e0994cc471537b5782038ee654fd/raw/teams_data.json';
window.HISTORY_URL = 'https://gist.githubusercontent.com/cworq/96e0e0994cc471537b5782038ee654fd/raw/players_history.json';

let TEAMS = [], sortMode = 'rating', lastHash = '';

const HERO_CDN = slug =>
  `https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/crops/${slug}.png`;

function fmt(n){ return n!=null ? Number(n).toLocaleString('ru-RU') : '—' }
function esc(s){ return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function wrColor(wr){ return wr>=60?'var(--gr)':wr>=50?'var(--gold)':'var(--red)' }

function avgRating(players){
  const r = (players||[]).filter(p=>p.rating);
  return r.length ? Math.round(r.reduce((s,p)=>s+p.rating,0)/r.length) : null;
}

// ── Match card ──
function matchHtml(m, myTeamId){
  const myTeam    = m.team1.id === myTeamId ? m.team1 : m.team2;
  const oppTeam   = m.team1.id === myTeamId ? m.team2 : m.team1;
  const won       = m.winner_id === myTeamId;
  const resultTx  = m.winner_id ? (won ? '✓ Победа' : '✗ Поражение') : '—';
  const resultCol = m.winner_id ? (won ? 'var(--gr)' : 'var(--red)') : 'var(--mt)';

  const myPlayers = (m.players||[]).filter(p=>p.team_id===myTeamId);

  const playerRows = myPlayers.map((p,i)=>`
    <tr class="pr">
      <td class="pnum">${i+1}</td>
      <td class="nk">${esc(p.nickname)}</td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <img src="${HERO_CDN(p.hero_slug)}" style="width:32px;height:18px;border-radius:3px;object-fit:cover" onerror="this.style.display='none'" alt="">
          <span>${esc(p.hero_name)}</span>
        </div>
      </td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:11px;text-align:center;color:var(--gr)">${p.kills}</td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:11px;text-align:center;color:var(--red)">${p.deaths}</td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:11px;text-align:center;color:var(--blue)">${p.assists}</td>
    </tr>`).join('');

  const uid = `m-${myTeamId}-${m.match_id}`;

  const pb = m.all_picks_bans||[];
  const rad = pb.filter(x=>x.team===0);
  const dire = pb.filter(x=>x.team===1);
  const pbHtml = `<div class="pb-section">
    <div class="pb-label">Очередность банов и пиков</div>
    <div style="display:flex;gap:20px;flex-wrap:wrap">
      <div>
        <div class="pb-team-label t0">Radiant</div>
        <div class="pb-sequence">
          ${rad.map((x,i)=>`
            <div class="pb-item ${x.is_pick?'pick':'ban'}" title="${x.hero_name}">
              <img src="${HERO_CDN(x.hero_slug)}" onerror="this.src=''" alt="">
              <span class="pb-order">${i+1}</span>
            </div>`).join('')}
        </div>
      </div>
      <div>
        <div class="pb-team-label t1">Dire</div>
        <div class="pb-sequence">
          ${dire.map((x,i)=>`
            <div class="pb-item ${x.is_pick?'pick':'ban'}" title="${x.hero_name}">
              <img src="${HERO_CDN(x.hero_slug)}" onerror="this.src=''" alt="">
              <span class="pb-order">${i+1}</span>
            </div>`).join('')}
        </div>
      </div>
    </div>
  </div>`;

  return `
<div class="match-card" id="${uid}">
  <div class="match-head" onclick="toggleMatch('${uid}')">
    <div class="mteams">
      <span style="color:${resultCol};font-weight:600">${resultTx}</span>
      <span class="mvs">vs</span>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(oppTeam.name)}</span>
    </div>
    <span class="mdur">${m.duration||''}</span>
    <a href="${m.opendota_url}" target="_blank" rel="noopener" class="mlink" onclick="event.stopPropagation()">OpenDota ↗</a>
    <svg class="mchev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
  </div>
  <div class="match-body"><div class="match-body-inner">
    ${pbHtml}
    ${myPlayers.length ? `
    <div class="mplayers">
      <div class="pb-label">Наши игроки</div>
      <table>
        <thead><tr>
          <th>#</th><th>Ник</th><th>Герой</th>
          <th class="r" style="text-align:center">K</th>
          <th class="r" style="text-align:center">D</th>
          <th class="r" style="text-align:center">A</th>
        </tr></thead>
        <tbody>${playerRows}</tbody>
      </table>
    </div>` : ''}
  </div></div>
</div>`;
}

function toggleMatch(uid){
  const el = document.getElementById(uid);
  if(el) el.classList.toggle('open');
}

// ── Team card ──
function renderCard(t, rank){
  const pl  = t.players || [];
  const avg = avgRating(pl);
  const rankClass = rank===1?'r1':rank===2?'r2':rank===3?'r3':'';

  // Players tab
  const playerRows = [...pl].sort((a,b)=>(b.rating||0)-(a.rating||0)).map((p,i)=>{
    const sid   = p.steam_id||'';
    const rat   = p.rating!=null ? fmt(p.rating) : '—';
    const sidCell = sid ? `<span class="sid">${sid}</span>` : '<span class="no-sid">нет данных</span>';
    const links = sid ? `<div class="plnks">
      <a href="${p.steam_url}" target="_blank" rel="noopener" class="plnk steam">↗ Steam</a>
      <a href="${p.dotabuff_url}" target="_blank" rel="noopener" class="plnk dotabuff">↗ Dotabuff</a>
    </div>` : '';
    
    const heroLines = (p.heroes_all||p.heroes||[]).slice(0,5).map(h=>{
      const c = h.winrate>=60?'var(--gr)':h.winrate>=50?'var(--gold)':'var(--red)';
      return `<div class="hero-line">
        <span class="hero-name">${esc(h.hero_name)}</span>
        <span class="hero-wr" style="color:${c}">${h.winrate}%</span>
        <span class="hero-games">${h.picks}g</span>
      </div>`;
    }).join('');

    const totalG = p.total_games_all || p.total_games || 0;
    const totalWR = p.overall_wr_all || p.overall_wr || 0;
    const wrTx  = totalG
      ? `<span style="font-size:10px;color:${wrColor(totalWR)};font-family:'JetBrains Mono',monospace">${totalWR}% (${totalG}g all)</span>`
      : '';

    return `<tr class="pr">
      <td class="pnum">${i+1}</td>
      <td class="nk">
        ${esc(p.nickname)}
        ${wrTx ? `<div style="margin-top:2px">${wrTx}</div>` : ''}
        ${heroLines ? `<div class="hero-block">${heroLines}</div>` : ''}
        ${sidCell}${links}
      </td>
      <td class="rat">${rat}</td>
    </tr>`;
  }).join('');

  // Matches tab
  const matches = (t.matches||[]).sort((a,b)=>new Date(b.start_time||0)-new Date(a.start_time||0));
  const matchesHtml = matches.length
    ? `<div class="match-list">${matches.map(m=>matchHtml(m, t.id)).join('')}</div>`
    : `<div style="padding:20px 16px;color:var(--mt);font-size:12px;text-align:center">Матчей пока нет</div>`;

  // History tab
  const historyHtml = p=>{
    if(!p.heroes_all || !p.heroes_all.length) return '<div style="padding:12px 16px;color:var(--mt);font-size:12px">Нет истории</div>';
    const rows = p.heroes_all.slice(0,10).map(h=>`<tr style="border-bottom:1px solid var(--brd-soft)">
      <td style="padding:6px;font-size:12px">${esc(h.hero_name)}</td>
      <td style="padding:6px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:11px">${h.picks}</td>
      <td style="padding:6px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:11px;color:${wrColor(h.winrate)};font-weight:600">${h.winrate}%</td>
    </tr>`).join('');
    return `<div style="padding:12px 16px">
      <div style="font-size:11px;color:var(--mt);margin-bottom:8px">Всего игр: ${p.total_games_all||0} | Винрейт: ${p.overall_wr_all||0}%</div>
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="border-bottom:1px solid var(--brd-soft)">
          <th style="padding:6px;text-align:left;font-size:10px">Герой</th>
          <th style="padding:6px;text-align:center;font-size:10px">Игр</th>
          <th style="padding:6px;text-align:center;font-size:10px">WR</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  };

  const wl = (t.games_won!=null && t.games_lost!=null)
    ? `<div class="wl-block"><span class="wbadge">${t.games_won}W</span><span class="lbadge">${t.games_lost}L</span></div>` : '';
  const trat = t.team_rating ? `<span class="trat">Σ ${fmt(t.team_rating)}</span>` : '';
  const tavg = avg ? `<span class="tavg">AVG ${fmt(avg)}</span>` : '';
  const srch = [t.name,...pl.map(p=>(p.nickname||'')+(p.steam_id||''))].join(' ').toLowerCase();
  const cid  = `c-${t.id}`;

  return `
<div class="card" data-s="${srch}" id="${cid}">
  <div class="ch" onclick="toggleCard('${cid}')">
    <span class="rank ${rankClass}">${rank}</span>
    <span class="tn">${esc(t.name)}</span>
    ${wl}
    <div class="team-meta">${trat}${tavg}</div>
    <span class="chev">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </span>
  </div>
  <div class="body"><div class="body-inner">
    <div class="tabs" id="tabs-${cid}">
      <div class="tab active" onclick="switchTab('${cid}','players')">Игроки (${pl.length})</div>
      <div class="tab" onclick="switchTab('${cid}','matches')">Матчи (${matches.length})</div>
      <div class="tab" onclick="switchTab('${cid}','history')">История</div>
    </div>
    <div class="tab-panel active" id="${cid}-players">
      <table>
        <thead><tr><th>#</th><th>Ник / Герои</th><th class="r">Рейтинг</th></tr></thead>
        <tbody>${playerRows||'<tr><td colspan="3" style="text-align:center;padding:14px;color:var(--mt);font-size:12px">Нет игроков</td></tr>'}</tbody>
      </table>
    </div>
    <div class="tab-panel" id="${cid}-matches">
      ${matchesHtml}
    </div>
    <div class="tab-panel" id="${cid}-history">
      ${pl.map(p=>historyHtml(p)).join('')}
    </div>
    <a href="${t.url}" target="_blank" rel="noopener" class="site-link">Открыть на mixer-cup.gg ↗</a>
  </div></div>
</div>`;
}

function toggleCard(cid){
  document.getElementById(cid)?.classList.toggle('open');
}

function switchTab(cid, tab){
  const tabs = document.getElementById(`tabs-${cid}`);
  if(!tabs) return;
  tabs.querySelectorAll('.tab').forEach((t,i)=>{
    const active = (i===0&&tab==='players')||(i===1&&tab==='matches')||(i===2&&tab==='history');
    t.classList.toggle('active', active);
  });
  document.getElementById(`${cid}-players`)?.classList.toggle('active', tab==='players');
  document.getElementById(`${cid}-matches`)?.classList.toggle('active', tab==='matches');
  document.getElementById(`${cid}-history`)?.classList.toggle('active', tab==='history');
}

function go(){
  let data = [...TEAMS];
  if(sortMode==='rating') data.sort((a,b)=>(b.team_rating||0)-(a.team_rating||0));
  const grid = document.getElementById('grid');
  grid.innerHTML = data.map((t,i)=>renderCard(t,i+1)).join('');
  grid.querySelectorAll('.card').forEach((c,i)=>{
    c.style.animationDelay = Math.min(i*25,300)+'ms';
  });
  filter();
}

function filter(){
  const q = document.getElementById('q').value.toLowerCase().trim();
  document.querySelectorAll('.card').forEach(c=>{
    const match = !q || c.dataset.s.includes(q);
    c.classList.toggle('hidden',!match);
    if(match&&q) c.classList.add('open');
    else if(!q)  c.classList.remove('open');
  });
}

function setSort(m){
  if(m===sortMode) return;
  sortMode=m;
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+m)?.classList.add('active');
  go();
}

function updateStats(){
  const allP = TEAMS.flatMap(t=>t.players||[]);
  const rated = TEAMS.filter(t=>t.team_rating);
  const tourAvg = rated.length ? Math.round(rated.reduce((s,t)=>s+t.team_rating,0)/rated.length) : null;
  document.getElementById('s-t').textContent   = TEAMS.length;
  document.getElementById('s-p').textContent   = allP.length;
  document.getElementById('s-i').textContent   = allP.filter(p=>p.steam_id).length;
  document.getElementById('s-avg').textContent = tourAvg ? fmt(tourAvg) : '—';
  document.getElementById('s-m').textContent   = Math.round(TEAMS.reduce((s,t)=>(t.matches||[]).length+s,0)/2);
}

function formatUpdatedAt(iso){
  if(!iso) return '';
  try{const d=new Date(iso);return ' · '+d.toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}catch{return ''}
}

async function loadData(){
  try{
    const url  = window.GIST_URL || 'teams_data.json';
    const resp = await fetch(url+(url.includes('?')?'&':'?')+'t='+Date.now());
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const json = await resp.json();
    let teams = Array.isArray(json)?json:(json.teams||[]);
    
    // Загружаем историю игроков
    let playerHistory = {};
    try {
      const histUrl = window.HISTORY_URL || 'players_history.json';
      const histResp = await fetch(histUrl+'?t='+Date.now());
      if(histResp.ok) playerHistory = await histResp.json();
      else console.warn('History not loaded:', histResp.status);
    } catch(e) { console.warn('History error:', e); }
    
    // Берём только текущий турнир (27 или последний)
    const currentTournament = 27;
    TEAMS = teams.filter(t => t.tournament_id === currentTournament);
    
    // Прибиваем историю игроков
    TEAMS.forEach(team => {
      team.players.forEach(player => {
        if(player.steam_id && playerHistory[player.steam_id]) {
          const ph = playerHistory[player.steam_id];
          player.heroes_all = ph.heroes_all || [];
          player.total_games_all = ph.total_games_all || 0;
          player.overall_wr_all = ph.overall_wr_all || 0;
        }
      });
    });
    document.getElementById('updated').textContent = formatUpdatedAt(json.updated_at);
    const hash = JSON.stringify(TEAMS);
    if(hash!==lastHash){lastHash=hash;updateStats();go();}
  }catch(e){
    document.getElementById('grid').innerHTML=
      `<div class="error">Не удалось загрузить данные<br><small>${e.message}</small><br><br>
       <span style="font-size:11px;color:var(--mt)">Запусти <code>python scraper.py</code> → <code>python -m http.server</code></span></div>`;
  }
}

loadData();
setInterval(loadData,5*60*1000);
</script>
</body></html>
