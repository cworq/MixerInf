name: Update Mixer-Cup Data

on:
  repository_dispatch:
    types: [run_scraper]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright and Stealth
        run: |
          pip install playwright playwright-stealth
          playwright install --with-deps chromium

      - name: Run scraper
        env:
          MIXER_COOKIE: ${{ secrets.MIXER_COOKIE }}
        run: python scraper.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add teams_data.json
          git diff --staged --quiet || git commit -m "Auto-update teams data [skip ci]"
          git push
